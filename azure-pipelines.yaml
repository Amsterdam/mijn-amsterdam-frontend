trigger: none
pr: none

resources:
  repositories:
    - repository: MamsInfra
      type: git
      name: MijnAmsterdam/mijn-amsterdam-infra
      ref: refs/heads/main

parameters:
  - name: btdBuild
    type: boolean
    default: true
  - name: btdTest
    type: boolean
    default: true
  - name: btdDeploy
    type: boolean
    default: true
  - name: dtapName
    type: string
    default: t
    values:
      - t
      - a
  - name: btdAppBFF
    type: boolean
    default: true
  - name: btdAppUI
    type: boolean
    default: true

variables:
  - template: 'pipelines/pool.yaml@MamsInfra'
    parameters:
      dtapName: ${{ parameters.dtapName }}

jobs:
  - template: pipelines/jobs/apps/btd-frontend.yaml@MamsInfra
    parameters:
      pool: ${{ variables.pool }}
      dtapName: ${{ parameters.dtapName }}
      btdBuild: ${{ parameters.btdBuild }}
      btdTest: ${{ parameters.btdTest }}
      btdDeploy: ${{ parameters.btdDeploy }}
      btdAppBFF: ${{ parameters.btdAppBFF }}
      btdAppUI: ${{ parameters.btdAppUI }}
