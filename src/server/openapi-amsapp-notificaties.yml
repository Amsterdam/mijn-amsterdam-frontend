openapi: 3.0.3
info:
  version: '1.0'
  title: Mijn Amsterdam api spec for external consumers (Amsterdam App)
  description: |
    We're providing a set of endpoints that can be used to retrieve data from source api's. These api's are intended for users other than Mijn Amsterdam
    Note: the paths that start with /private are only accessible in development mode (localhost) or via our private-network resources.
  contact:
    name: Mijn Amsterdam
    url: https://mijn.amsterdam.nl/
    email: mijnAmsterdam@amsterdam.nl
servers:
  - url: https://mijn.amsterdam.nl
  - url: https://az-acc.mijn.amsterdam.nl
  - url: https://test.mijn.amsterdam.nl
  - url: http://localhost:5000

paths:
  /api/v1/services/amsapp/notifications/login/{consumerId}:
    get:
      description: Redirects to an identity provider, initiates as OIDC session on callback.
      parameters:
        - name: consumerId
          in: path
          required: true
          schema:
            type: string
      responses:
        '302':
          description: Found. Valid redirect to identity provider login
        '404':
          description: Not Found. (Missing path parameter)
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/ErrorNotFound'
  /api/v1/services/amsapp/notifications/consumer/{consumerId}/app:
    get:
      description: |
        Registers the consumer based on the identity provider's response and redirects to an html page with a link to open the Amsterdam App.
      parameters:
        - name: consumerId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: |
            Always returns an html page. The page contains a link that will open the Amsterdam App.\
            If the consumer has been registrered succesfully, the app link will not contain query parameters.\
            If an error occurred, an ApiErrorNotificatieConsumerId will be passed as query parameter to the app link.
          content:
            'text/html':
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ApiErrorNotificatieConsumerId'
                  - type: string
        '404':
          description: Missing path parameter
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/ErrorNotFound'
  /private/api/v1/services/amsapp/notifications/consumer/{consumerId}:
    get:
      description: Get consumer profile and registration status. Or if consumer is not registered, return only registration status with false.
      parameters:
        - name: consumerId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/xApiKeyHeader'
      responses:
        '200':
          description: Current registration profile of consumer
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ConsumerRegistered'
                  - allOf:
                      - $ref: '#/components/schemas/ConsumerProfile'
                      - $ref: '#/components/schemas/ConsumerRegistered'
        '404':
          description: Consumer not found
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/ErrorNotFound'
        '500':
          description: |
            Returns Application error, any error in code or from failed requests.
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/ApplicationError'
    delete:
      parameters:
        - in: path
          name: consumerId
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/xApiKeyHeader'
      responses:
        '200':
          description: Consumer deleted
        '404':
          description: Consumer not found
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/ErrorNotFound'
        '500':
          description: |
            Returns Application error, any error in code or from failed requests.
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/ApplicationError'
  /private/api/v1/services/amsapp/notifications:
    get:
      security:
        - ApiKeyAuth: []
      description: |
        Retrieves all notification data of all consumers.
      parameters:
        - $ref: '#/components/parameters/xApiKeyHeader'
        - name: dateFrom
          in: query
          required: false
          description: |
            Only return consumer notification data updated on/after this timestamp (ISO 8601). Defaults to 7 days ago
          schema:
            type: string
            format: date-time
            example: '2026-03-01T00:00:00.000Z'
        - name: offset
          in: query
          required: false
          description: Number of consumer records to skip
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: limit
          in: query
          required: false
          description: Maximum number of consumer records to return
          schema:
            type: integer
            minimum: 1
            default: 100
      responses:
        '200':
          description: Returns consumer notifications data
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/ConsumerNotificationsResponse'
        '400':
          description: Returns bad request error
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/ErrorBadRequest'
        '401':
          description: Returns unauthorized error (invalid api key)
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/ErrorUnauthorized'
        '500':
          description: |
            Returns Application error, any error in code or from failed requests.
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/ApplicationError'
    delete:
      security:
        - ApiKeyAuth: []
      description: |
        Truncate all notifications data.\
        Note: This is a temporary endpoint for the PoC
      parameters:
        - $ref: '#/components/parameters/xApiKeyHeader'
      responses:
        '200':
          description: Returns an application success response
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/ApiSuccessResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationError'
  /private/api/v1/services/amsapp/job/notifications:
    post:
      security:
        - ApiKeyAuth: []
      description: |
        Triggers job that fetches all notification data of all consumers.\
        Note: This endpoint has a long execution time, making it impractical to await.\
        A success response is send to indicate it has started.
      parameters:
        - $ref: '#/components/parameters/xApiKeyHeader'
      responses:
        '200':
          description: Returns an application success response
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/ApiSuccessResponse'

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
  schemas:
    ApplicationError:
      type: object
      description: |
        Error if a part of the application returns an error, mostly dependency errors to remote systems.
      properties:
        content:
          nullable: true
        code:
          type: number
          enum:
            - 500
        status:
          type: string
          enum:
            - 'ERROR'
        message:
          type: string

    ApiErrorNotificatieConsumerId:
      type: object
      description: |
        * 001: Niet ingelogd met Digid
        * 002: Verzenden van consumerId naar de Amsterdam app niet gelukt
        * 000: Onbekende error
      properties:
        message:
          type: string
        code:
          type: string
          enum:
            - '000'
            - '001'
            - '002'
    ConsumerNotificationsResponse:
      type: object
      properties:
        content:
          type: array
          items:
            type: object
            properties:
              consumerIds:
                type: array
                items:
                  type: string
                  default: '123'
              dateUpdated:
                type: string
                format: date-time
              services:
                type: array
                items:
                  oneOf:
                    - $ref: '#/components/schemas/ServiceResultOk'
                    - $ref: '#/components/schemas/ServiceResultError'
                  discriminator:
                    propertyName: status
                    mapping:
                      OK: '#/components/schemas/ServiceResultOk'
                      ERROR: '#/components/schemas/ServiceResultError'
        status:
          type: string
          enum:
            - 'OK'
        meta:
          $ref: '#/components/schemas/ConsumerNotificationsMeta'

    ConsumerNotificationsMeta:
      type: object
      properties:
        dateFrom:
          type: string
          format: date-time
          description: The effective dateFrom filter applied to the result set
          example: '2026-03-01T00:00:00.000Z'
        offset:
          type: string
          description: The effective offset applied
          example: '0'
        limit:
          type: string
          description: The effective limit applied
          example: '100'
        total:
          type: integer
          minimum: 0
          description: Total number of consumers matching the dateFrom filter (ignores offset/limit)
    ServiceResultBase:
      type: object
      properties:
        serviceId:
          type: string
        dateUpdated:
          type: string
          format: date-time
    ServiceResultOk:
      allOf:
        - $ref: '#/components/schemas/ServiceResultBase'
        - type: object
          properties:
            status:
              type: string
              enum:
                - 'OK'
            content:
              type: array
              items:
                $ref: '#/components/schemas/ServiceResult'
    ServiceResultError:
      allOf:
        - $ref: '#/components/schemas/ServiceResultBase'
        - type: object
          properties:
            status:
              type: string
              enum:
                - 'ERROR'
            content:
              type: object
              default: null
            message:
              type: string
              default: 'DEPENDENCY ERROR'
    ServiceResult:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        datePublished:
          type: string
          format: date-time
        isTip:
          type: boolean
          default: false
    ConsumerProfile:
      type: object
      properties:
        profileId:
          type: string
        profileName:
          type: string
        serviceIds:
          type: array
          items:
            type: string
        dateUpdated:
          type: string
          format: date-time
    ConsumerRegistered:
      type: object
      properties:
        isRegistered:
          type: boolean
    ApiSuccessResponse:
      type: object
      properties:
        content:
          type: string
          example: success
        status:
          type: string
          example: OK
    ErrorNotFound:
      type: object
      properties:
        content:
          nullable: true
        code:
          type: number
          enum:
            - 404
        status:
          type: string
          enum:
            - 'ERROR'
        message:
          type: string
          enum:
            - 'Not Found'
    ErrorUnauthorized:
      type: object
      properties:
        content:
          nullable: true
        code:
          type: number
          enum:
            - 401
        status:
          type: string
          enum:
            - 'ERROR'
        message:
          type: string
          enum:
            - 'Api key ongeldig'
    ErrorBadRequest:
      type: object
      properties:
        content:
          nullable: true
        code:
          type: number
          enum:
            - 400
        status:
          type: string
          enum:
            - 'ERROR'
        message:
          type: string
          enum:
            - 'Bad request: ApiError 000 - Onbekende fout'
  parameters:
    xApiKeyHeader:
      name: x-api-key
      in: header
      required: true
      schema:
        type: string
